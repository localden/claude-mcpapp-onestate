<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 12px;
      background: transparent;
    }
    .card {
      border: 3px solid #16a34a;
      border-radius: 12px;
      padding: 16px;
      background: #f0fdf4;
      transition: all .15s ease;
    }
    .card.superseded {
      border-color: #d4d4d4;
      background: #fafafa;
      opacity: 0.7;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    .title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      background: #16a34a;
      color: white;
    }
    .badge::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .card.superseded .badge { background: #a3a3a3; }
    .card.superseded .badge::before { animation: none; opacity: .6; }
    .banner {
      display: none;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #e5e5e5;
      border-radius: 6px;
      font-size: 13px;
      color: #525252;
    }
    .card.superseded .banner { display: block; }
    ul { list-style: none; margin-bottom: 12px; }
    li {
      padding: 8px 10px;
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .empty { font-size: 13px; color: #737373; padding: 8px 0 12px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      background: #16a34a;
      color: white;
      cursor: pointer;
    }
    button.secondary { background: #525252; }
    button:hover { filter: brightness(1.1); }
    button:disabled {
      background: #d4d4d4;
      color: #737373;
      cursor: not-allowed;
    }
    .meta {
      margin-top: 10px;
      font-size: 10px;
      color: #a3a3a3;
      font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <div id="card" class="card">
    <div class="header">
      <span class="title">🛒 Your cart</span>
      <span id="badge" class="badge">Live</span>
    </div>
    <div class="banner">⬇&nbsp; Superseded — see the latest cart below.</div>
    <ul id="items"></ul>
    <div id="empty" class="empty">Cart is empty.</div>
    <div class="actions">
      <button id="addBtn">+ Add item</button>
      <button id="tellBtn" class="secondary">Tell Claude about my cart</button>
    </div>
    <div id="meta" class="meta"></div>
  </div>

  <script type="module">
    // ─────────────────────────────────────────────────────────────────────
    // Minimal MCP Apps host bridge (raw JSON-RPC over window.postMessage).
    // Kept inline so this widget has zero external dependencies / no CSP.
    // ─────────────────────────────────────────────────────────────────────
    const host = (() => {
      let nextId = 1;
      const pending = new Map();
      const notificationHandlers = new Map();

      window.addEventListener("message", (event) => {
        const data = event.data;
        if (!data || data.jsonrpc !== "2.0") return;
        if (Object.prototype.hasOwnProperty.call(data, "id") && (data.result !== undefined || data.error !== undefined)) {
          const p = pending.get(data.id);
          if (p) {
            pending.delete(data.id);
            data.error ? p.reject(new Error(data.error?.message || JSON.stringify(data.error))) : p.resolve(data.result);
          }
        } else if (data.method) {
          const h = notificationHandlers.get(data.method);
          if (h) h(data.params);
        }
      });

      return {
        request(method, params) {
          const id = nextId++;
          return new Promise((resolve, reject) => {
            pending.set(id, { resolve, reject });
            window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
          });
        },
        notify(method, params) {
          window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
        },
        on(method, handler) {
          notificationHandlers.set(method, handler);
        },
      };
    })();

    function autoResize() {
      const send = () => {
        const r = document.body.getBoundingClientRect();
        host.notify("ui/notifications/size-changed", {
          width: Math.ceil(r.width),
          height: Math.ceil(r.height),
        });
      };
      new ResizeObserver(send).observe(document.body);
      send();
    }

    // ─────────────────────────────────────────────────────────────────────
    // Widget state
    // ─────────────────────────────────────────────────────────────────────
    const CATALOG = ["Avocados", "Bananas", "Sourdough", "Oat milk", "Greek yogurt", "Cold brew", "Pasta", "Olive oil"];
    let items = [];
    let superseded = false;
    let instanceId = (crypto?.randomUUID?.() ?? String(Math.random()).slice(2));

    // Election key. Preferred source is the *server-minted* {createdAt, seq}
    // from the tool result's structuredContent — that reflects tool-call
    // order and is stored in the conversation transcript, so it's identical
    // on every device and every remount. Client mount time (Date.now()) is
    // only a last-resort fallback; on mobile rehydration, cells can mount
    // out of transcript order, which would invert the election.
    let orderKey = Date.now();   // primary comparable (server createdAt when available)
    let seq = undefined;          // server's monotonic counter; same-ms tiebreak
    let keySource = "client";    // "server" | "cache" | "client" — for the debug footer
    let keyFinalized = false;     // gate: ignore channel traffic until the key is settled

    // Resolved when ui/notifications/tool-result delivers the server key.
    let serverKeyResolve;
    const serverKeyReady = new Promise((r) => { serverKeyResolve = r; });

    const ELECTION_KEY = (id) => `mcp-demo-cart:election:${id}`;
    function loadCachedKey(id) {
      try {
        const raw = localStorage.getItem(ELECTION_KEY(id));
        if (!raw) return null;
        const k = JSON.parse(raw);
        if (k && Number.isFinite(k.orderKey)) return k;
      } catch { /* ignore */ }
      return null;
    }
    function persistKey(id) {
      try { localStorage.setItem(ELECTION_KEY(id), JSON.stringify({ orderKey, seq })); }
      catch { /* storage unavailable */ }
    }

    const el = {
      card: document.getElementById("card"),
      badge: document.getElementById("badge"),
      items: document.getElementById("items"),
      empty: document.getElementById("empty"),
      addBtn: document.getElementById("addBtn"),
      tellBtn: document.getElementById("tellBtn"),
      meta: document.getElementById("meta"),
    };

    function render() {
      el.items.replaceChildren(...items.map((it) => {
        const li = document.createElement("li");
        li.textContent = it;
        return li;
      }));
      el.empty.style.display = items.length ? "none" : "block";
      el.card.classList.toggle("superseded", superseded);
      el.badge.textContent = superseded ? "Superseded" : "Live";
      el.addBtn.disabled = superseded;
      el.tellBtn.disabled = superseded;
      el.meta.textContent = `instance ${String(instanceId).slice(0, 12)} · ${seq != null ? `#${seq} · ` : ""}${new Date(orderKey).toLocaleTimeString()} (${keySource})`;
    }

    // Last-known ticket from every sibling, keyed by their instanceId.
    // Superseded is recomputed from this map so it can flip back to live
    // if a late-arriving server key changes the ordering.
    const peers = new Map();

    // "server" and "cache" are both server-authoritative (cache is a
    // persisted server key). "client" is a different clock domain and
    // must not be compared against server values.
    const isAuthoritative = (src) => src === "server" || src === "cache";

    function recomputeSuperseded() {
      const next = [...peers.values()].some(isYounger);
      if (next !== superseded) {
        superseded = next;
        console.log("[cart-widget]", instanceId, next ? "→ superseded" : "→ live");
      }
      render();
    }

    // Gate all host-mutating calls on !superseded
    function updateModelContext() {
      if (superseded) return;
      host.request("ui/update-model-context", {
        content: [{
          type: "text",
          text: `The user's cart widget currently shows ${items.length} item(s): ${items.join(", ") || "(empty)"}.`,
        }],
      }).catch((e) => console.warn("[cart-widget] updateModelContext failed:", e.message));
    }

    el.addBtn.addEventListener("click", () => {
      if (superseded) return;
      items.push(CATALOG[Math.floor(Math.random() * CATALOG.length)]);
      render();
      updateModelContext();
    });

    el.tellBtn.addEventListener("click", () => {
      if (superseded) return;
      host.request("ui/message", {
        role: "user",
        content: [{ type: "text", text: `My cart now has: ${items.join(", ") || "nothing"}.` }],
      }).catch((e) => console.warn("[cart-widget] ui/message failed:", e.message));
    });

    // ─────────────────────────────────────────────────────────────────────
    // Supersede protocol over BroadcastChannel.
    //
    // All widget iframes for a given connector share an origin on
    // *.claudemcpcontent.com (sandbox="allow-same-origin"), so a
    // BroadcastChannel reaches every instance in the conversation.
    //
    // Each instance announces its server-minted {orderKey, seq} once that
    // key is finalized. Any instance that sees a sibling with a later key
    // marks itself superseded and stops calling ui/update-model-context
    // and ui/message. Messages received before our own key is finalized
    // are ignored — our announce() will trigger a fresh hello/born
    // exchange once we're ready.
    // ─────────────────────────────────────────────────────────────────────
    const channel = new BroadcastChannel("mcp-demo-cart-supersede");

    const ticket = () => ({ instanceId, orderKey, seq, keySource });

    function isYounger(other) {
      // Never supersede across clock domains — a client Date.now() and a
      // server createdAt aren't comparable (server value may be hours old
      // on a rehydrated chat). Wait for both sides to be authoritative.
      if (isAuthoritative(other.keySource) !== isAuthoritative(keySource)) return false;
      // Primary: createdAt / bornAt within the same domain.
      if (other.orderKey !== orderKey) return other.orderKey > orderKey;
      // Same-ms tiebreak: server's monotonic counter, when both have it.
      if (other.seq != null && seq != null && other.seq !== seq) return other.seq > seq;
      // Final deterministic tiebreak.
      return String(other.instanceId) > String(instanceId);
    }

    channel.onmessage = (ev) => {
      const msg = ev.data;
      if (!msg || msg.instanceId === instanceId) return;
      if (!keyFinalized) return; // we'll announce() once ready; peers reply then
      if (msg.type === "hello") {
        channel.postMessage({ type: "born", ...ticket() });
      }
      if (msg.type === "hello" || msg.type === "born") {
        peers.set(msg.instanceId, msg);
        recomputeSuperseded();
      }
    };

    function announce() {
      channel.postMessage({ type: "hello", ...ticket() });
      channel.postMessage({ type: "born", ...ticket() });
    }

    // ─────────────────────────────────────────────────────────────────────
    // Host handshake
    // ─────────────────────────────────────────────────────────────────────
    host.on("ui/notifications/tool-input", (params) => {
      const arg = params?.arguments?.items;
      if (Array.isArray(arg)) {
        items = arg.map(String);
        render();
        updateModelContext();
      }
    });

    host.on("ui/notifications/tool-result", (params) => {
      const sc = params?.structuredContent;
      if (!sc) return;
      if (Array.isArray(sc.items) && items.length === 0) {
        items = sc.items.map(String);
      }
      if (Number.isFinite(sc.createdAt)) {
        // Server-authoritative election key arrives here. Finalize/announce
        // is driven from the init IIFE below via serverKeyReady.
        serverKeyResolve({ orderKey: sc.createdAt, seq: Number.isFinite(sc.seq) ? sc.seq : undefined });
      }
      render();
      updateModelContext();
    });

    const delay = (ms) => new Promise((r) => setTimeout(r, ms));

    (async () => {
      render();
      let hasStableId = false;
      try {
        const init = await host.request("ui/initialize", {
          protocolVersion: "2026-01-26",
          appInfo: { name: "CartSupersedeDemo", version: "1.0.0" },
          appCapabilities: {},
        });
        const hostInstanceId = init?.hostContext?.toolInfo?.id;
        // iOS returns nil for toolInfo.id when rehydrating a stored
        // conversation, so hasStableId stays false there and the
        // localStorage cache is skipped entirely — the server key from
        // tool-result is the only ordering source that works on iOS.
        if (hostInstanceId !== undefined && hostInstanceId !== null) {
          instanceId = hostInstanceId;
          hasStableId = true;
        }
        host.notify("ui/notifications/initialized", {});
      } catch (e) {
        console.warn("[cart-widget] ui/initialize failed (running outside a host?):", e.message);
      }

      // Finalize the election key. Prefer the server-minted value from
      // tool-result; if it hasn't arrived within 1s, fall back to a cached
      // copy from a previous mount, else to the client-side provisional.
      const serverKey = await Promise.race([serverKeyReady, delay(1000).then(() => null)]);
      if (serverKey) {
        orderKey = serverKey.orderKey;
        seq = serverKey.seq;
        keySource = "server";
      } else if (hasStableId) {
        const cached = loadCachedKey(instanceId);
        if (cached) {
          orderKey = cached.orderKey;
          seq = cached.seq;
          keySource = "cache";
        }
      }
      if (hasStableId && keySource !== "client") persistKey(instanceId);
      keyFinalized = true;

      render();
      autoResize();
      announce();

      // If the server key arrives after the timeout, adopt it, re-evaluate
      // against known peers (we may flip back to live), and re-announce so
      // peers update their view of us.
      if (!serverKey) {
        serverKeyReady.then((k) => {
          orderKey = k.orderKey;
          seq = k.seq;
          keySource = "server";
          if (hasStableId) persistKey(instanceId);
          recomputeSuperseded();
          announce();
        });
      }
    })();
  </script>
</body>
</html>
